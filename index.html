<style>
  :root {
    --bg: #faf7f2;
    --ink: #1a1714;
    --ink-soft: #6b6560;
    --line: #e8e2d8;
    --card: #ffffff;
    --accent: #d64933;
    --checkin: #2d7a4f;
    --checkout: #c85a3a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Pretendard', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    padding-bottom: 40px;
  }
  .shell { max-width: 1100px; margin: 0 auto; padding: 0 16px; }
  header {
    padding: 18px 0 12px;
    border-bottom: 1px solid var(--line);
    margin-bottom: 16px;
  }
  .brand-row {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }
  h1 {
    font-family: 'Georgia', serif;
    font-size: 24px;
    font-weight: 600;
    letter-spacing: -0.02em;
  }
  h1 span { color: var(--accent); }
  .status-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: var(--ink-soft);
  }
  .dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #d5ccbc;
  }
  .dot.ok { background: #22c55e; }
  .dot.syncing { background: #e8a33d; animation: pulse 1s infinite; }
  .dot.err { background: #ef4444; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
  .btn-icon {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 5px 12px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    color: var(--ink);
    font-family: inherit;
  }
  .btn-icon:hover { background: var(--line); }
  .btn-add {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }
  .btn-add:hover { filter: brightness(1.1); background: var(--accent); }
  .lang-toggle {
    display: inline-flex;
    gap: 2px;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 2px;
    margin-left: 4px;
  }
  .lang-btn {
    border: none;
    background: transparent;
    padding: 4px 9px;
    border-radius: 999px;
    cursor: pointer;
    font-family: inherit;
    font-size: 11px;
    font-weight: 700;
    color: var(--ink-soft);
  }
  .lang-btn.active {
    background: var(--ink);
    color: var(--bg);
  }

  /* OPS (운영정보) */
  .ops-section {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 10px;
  }
  .ops-header {
    display: flex;
    gap: 6px;
    align-items: center;
    margin-bottom: 8px;
  }
  .ops-title-input {
    flex: 1;
    padding: 8px 12px;
    border: 1px solid var(--line);
    border-radius: 7px;
    font-family: inherit;
    font-size: 15px;
    font-weight: 700;
    background: white;
    color: var(--ink);
  }
  .ops-title-input:focus {
    outline: none;
    border-color: var(--accent);
  }
  .ops-del {
    flex-shrink: 0;
  }
  .ops-content {
    width: 100%;
    min-height: 70px;
    padding: 12px 14px;
    border: 1px solid var(--line);
    border-radius: 8px;
    font-family: inherit;
    font-size: 14px;
    line-height: 1.7;
    background: #faf7f2;
    resize: none;
    overflow: hidden;
    color: var(--ink);
    box-sizing: border-box;
  }
  .ops-content:focus {
    outline: none;
    border-color: var(--accent);
    background: white;
  }

  /* 청소 기록 (LOGS) */
  .logs-day {
    margin-bottom: 18px;
  }
  .logs-group {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 8px 10px;
    margin-bottom: 8px;
  }
  .logs-cleaner {
    display: inline-block;
    padding: 4px 10px;
    border-radius: 4px;
    font-size: 12px;
    font-weight: 700;
    margin-bottom: 6px;
  }
  .logs-count {
    background: rgba(255,255,255,0.3);
    padding: 1px 6px;
    border-radius: 999px;
    font-size: 10px;
    margin-left: 4px;
  }
  .logs-rooms {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .logs-room {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 8px;
    background: #faf7f2;
    border-radius: 5px;
    font-size: 13px;
    flex-wrap: wrap;
  }
  .logs-room-name {
    font-weight: 600;
  }
  .logs-memo {
    font-size: 11px;
    color: var(--ink-soft);
    background: white;
    padding: 2px 6px;
    border-radius: 4px;
    border: 1px solid var(--line);
    margin-left: auto;
  }
  .tabs {
    display: flex;
    gap: 4px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    flex-shrink: 0;
    border: 1px solid var(--line);
    background: var(--card);
    padding: 8px 16px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 600;
    color: var(--ink-soft);
    cursor: pointer;
    font-family: inherit;
  }
  .tab.active {
    background: var(--ink);
    color: var(--bg);
    border-color: var(--ink);
  }
  .day-header {
    display: flex;
    align-items: baseline;
    gap: 10px;
    padding-bottom: 10px;
    border-bottom: 2px solid var(--ink);
    margin-bottom: 10px;
    margin-top: 18px;
  }
  .day-header:first-child { margin-top: 0; }
  .day-date {
    font-family: 'Georgia', serif;
    font-size: 22px;
    font-weight: 700;
  }
  .day-dow {
    font-size: 13px;
    color: var(--ink-soft);
    font-weight: 600;
  }
  .day-tag {
    margin-left: auto;
    color: white;
    font-size: 10px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 4px;
    letter-spacing: 0.05em;
  }
  .day-tag.today { background: var(--accent); }
  .day-tag.tomorrow { background: #1e88e5; }
  .section { margin-bottom: 18px; }
  .section-title {
    font-size: 12px;
    font-weight: 700;
    color: var(--ink-soft);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .section-count {
    background: var(--ink);
    color: var(--bg);
    font-size: 10px;
    padding: 1px 7px;
    border-radius: 999px;
    font-weight: 700;
  }
  .empty-msg {
    color: var(--ink-soft);
    font-style: italic;
    font-size: 12px;
    padding: 8px 4px;
  }
  .event {
    background: var(--card);
    border: 1px solid var(--line);
    border-left-width: 5px;
    border-radius: 8px;
    padding: 10px 12px;
    margin-bottom: 6px;
    cursor: pointer;
    transition: transform 0.1s;
  }
  .event:hover { transform: translateX(2px); }
  .event-row {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .badge {
    font-size: 10px;
    font-weight: 700;
    padding: 3px 7px;
    border-radius: 4px;
    letter-spacing: 0.05em;
    flex-shrink: 0;
  }
  .badge.checkout { background: #fde6de; color: var(--checkout); }
  .badge.checkin { background: #dbf0e3; color: var(--checkin); }
  .badge.common { background: #e8e4f5; color: #6a5aa8; }
  .branch-tag {
    font-size: 11px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 4px;
    color: white;
    flex-shrink: 0;
  }
  .room-name {
    font-size: 14px;
    font-weight: 600;
    flex: 1;
    min-width: 0;
    word-break: break-word;
  }
  .time-tag {
    font-family: 'Georgia', serif;
    font-size: 14px;
    font-weight: 700;
    color: var(--ink);
    flex-shrink: 0;
  }
  .time-tag.custom {
    background: #fff8dc;
    padding: 2px 8px;
    border-radius: 4px;
    border: 1px solid #f0dca0;
    color: #7a5c1a;
  }
  .platform {
    font-size: 12px;
    opacity: 0.7;
    flex-shrink: 0;
  }
  .cleaner-tag {
    display: inline-block;
    font-size: 11px;
    font-weight: 700;
    color: white;
    padding: 3px 8px;
    border-radius: 4px;
    margin-top: 6px;
    margin-right: 4px;
  }
  .cleaner-tag.unassigned {
    background: #f5f0e8;
    color: #8a7860;
    border: 1.5px dashed #c9b998;
  }
  .memo-tag {
    display: inline-block;
    font-size: 11px;
    color: var(--ink-soft);
    background: #faf7f2;
    padding: 3px 8px;
    border-radius: 4px;
    border: 1px solid var(--line);
    margin-top: 6px;
    word-break: break-word;
  }
  .daymemo-wrap {
    background: #fff8e8;
    border: 1px solid #f0dca0;
    border-radius: 10px;
    padding: 12px 14px;
  }
  .daymemo-input {
    width: 100%;
    min-height: 70px;
    padding: 12px 14px;
    border: 1px solid #e8d8a0;
    border-radius: 8px;
    font-family: inherit;
    font-size: 15px;
    line-height: 1.7;
    background: white;
    resize: none;
    overflow: hidden;
    color: var(--ink);
    box-sizing: border-box;
    font-weight: 500;
  }
  .daymemo-input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(214, 73, 51, 0.1);
  }
  .daymemo-input::placeholder {
    color: #b8a878;
    font-weight: 400;
    font-style: italic;
  }
  .daymemo-saved {
    font-size: 11px;

<body>

<div id="save-status-indicator" style="display:none; position:fixed; top:12px; right:12px; padding:8px 14px; border-radius:8px; font-size:13px; font-weight:600; z-index:9999; box-shadow:0 2px 8px rgba(0,0,0,0.15); transition:opacity 0.3s;"></div>

<div class="shell">

        <button class="btn-icon" id="btn-refresh">↻</button>

        <button class="btn-icon btn-add" id="btn-add-common" data-i18n="btnAddCommonCleaning" style="display:none">+ 공용공간 청소</button>
        <button class="btn-icon" id="btn-settings" data-i18n="btnSettings">설정</button>
        <span class="lang-toggle">
          <button class="lang-btn active" data-lang="ko">한</button>
          <button class="lang-btn" data-lang="en">EN</button>
        </span>
      </div>
    </div>
    <div class="tabs" id="tabs" style="display:none">
      <button class="tab active" data-view="today" data-i18n="tabToday">오늘</button>
      <button class="tab" data-view="tomorrow" data-i18n="tabTomorrow">내일</button>
      <button class="tab" data-view="bystaff" data-i18n="tabByStaff">직원별</button>
      <button class="tab" data-view="week" data-i18n="tabWeek">일정표</button>
      <button class="tab" data-view="logs" data-i18n="tabLogs">기록</button>
      <button class="tab" data-view="ops" data-i18n="tabOps">운영정보</button>
    </div>
  </header>

  <div id="error-area"></div>
  <div id="main"><div class="loading">불러오는 중…</div></div>
</div>

let cloudSaveTimer = null;
let cloudSyncPaused = false;
let lastCloudSavedAt = null;
let lastLocalSaveAt = 0;  // 마지막으로 우리가 cloudSave 시작/완료한 시각 (echo 폴링 방지용)

// ─── 안전성 강화 변수들 ───
let cloudSaveInFlight = false;     // 동시에 여러 cloudSave가 실행되는 것 방지 (락)
let beaconFired = false;           // pagehide/beforeunload 중복 호출 방지
const PENDING_QUEUE_KEY = 'schedule_v2_pending';  // 저장 실패 시 임시 보관 큐
const RETRY_DELAYS = [1000, 2000, 4000];          // 지수 백오프 (1초 → 2초 → 4초)

// Firebase가 준비될 때까지 대기 (이미 준비됐을 수도 있음)
function waitForFirebase(timeoutMs = 5000) {
  return new Promise((resolve, reject) => {
    if (window.fb && window.fb.ready) return resolve();
    const timer = setTimeout(() => reject(new Error('Firebase load timeout')), timeoutMs);
    window.addEventListener('firebase-ready', () => {
      clearTimeout(timer);
      resolve();
    }, { once: true });
  });
}

// Firebase에서 데이터 읽기
async function cloudLoad() {
  try {
    await waitForFirebase();
    const snapshot = await window.fb.get(window.fb.ref(window.fb.db, CONFIG.fbDataPath));
    if (!snapshot.exists()) return null;
    return snapshot.val();
  } catch (e) { console.warn('Cloud load failed:', e); return null; }
}

// jsonbin에서 데이터 읽기 (마이그레이션용, 1회만 사용)
async function jsonbinLoadForMigration() {
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), CONFIG.cloudLoadTimeoutMs);
  try {
    const resp = await fetch(`${CONFIG.cloudUrl}/${CONFIG.cloudBin}/latest`, {
      headers: { 'X-Master-Key': CONFIG.cloudKey },
      signal: ctrl.signal,
    });
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();
    return data.record || null;
  } catch (e) { console.warn('jsonbin migration load failed:', e); return null; }
  finally { clearTimeout(timer); }
}

function cloudSaveDebounced() {
  // debounce 대기 중에도 폴링이 자기 echo를 가져오지 않게 시각 갱신
  lastLocalSaveAt = Date.now();
  // 저장 대기 중 표시
  setSaveStatus('saving');

}

// 현재 state로 payload 생성 (재사용)
// Firebase는 undefined를 거부하므로 JSON 직렬화/역직렬화로 깨끗이 정리
function buildPayload() {
  const raw = {
    v: 2,
    savedAt: new Date().toISOString(),
    branches: state.branches,
    rooms: state.rooms,
    staff: state.staff,
    notes: state.notes,
    manualBookings: state.manualBookings,
    dayMemo: state.dayMemo,
    opsSections: state.opsSections,
    commonAreaCleanings: state.commonAreaCleanings,
    cleaningLogs: state.cleaningLogs,
  };
  // JSON 왕복으로 undefined 제거 (Firebase가 undefined를 거부함)
  return JSON.parse(JSON.stringify(raw));
}

// 한 번의 저장 시도 (재시도 로직에서 사용)
async function cloudPutOnce(payload, timeoutMs) {
  await waitForFirebase();
  // Firebase set은 자체 타임아웃이 있지만 우리도 별도로 적용
  return new Promise((resolve, reject) => {
    const timer = setTimeout(() => reject(new Error('Firebase save timeout')), timeoutMs);
    window.fb.set(window.fb.ref(window.fb.db, CONFIG.fbDataPath), payload)
      .then(() => { clearTimeout(timer); resolve(true); })
      .catch(e => { clearTimeout(timer); reject(e); });
  });
}

// 저장 실패 시 임시 큐에 보관
function savePendingQueue(payload) {
  try {
    localStorage.setItem(PENDING_QUEUE_KEY, JSON.stringify({
      payload: payload,
      queuedAt: Date.now(),
    }));
    console.warn('Saved to pending queue for later retry');
  } catch (e) { console.warn('Pending queue save failed:', e); }
}

// 큐에서 꺼내기
function loadPendingQueue() {
  try {
    const raw = localStorage.getItem(PENDING_QUEUE_KEY);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch (e) { return null; }
}

// 큐 비우기
function clearPendingQueue() {
  try { localStorage.removeItem(PENDING_QUEUE_KEY); } catch (e) {}
}

// 큐에 저장 실패한 데이터가 있으면 재전송 시도
async function flushPendingQueue() {
  const pending = loadPendingQueue();
  if (!pending || !pending.payload) return;
  // 큐 안 데이터가 너무 오래된 경우 (24시간) 그냥 버림 (현재 상태로 덮어쓰기됨)
  if (Date.now() - pending.queuedAt > 24 * 60 * 60 * 1000) {
    clearPendingQueue();
    return;
  }
  // 클라우드에 더 최신 데이터가 있는지 먼저 확인 (다른 사람이 그 사이 저장했을 수 있음)
  try {
    const cloud = await cloudLoad();
    if (cloud && cloud.savedAt && new Date(cloud.savedAt) > new Date(pending.payload.savedAt)) {
      // 클라우드가 더 최신이면, 큐의 데이터로 덮어쓰지 않음 (충돌 회피)
      console.warn('Pending queue discarded: cloud has newer data');
      clearPendingQueue();
      return;
    }
  } catch (e) { /* 무시하고 재전송 시도 */ }

  try {
    await cloudPutOnce(pending.payload, CONFIG.cloudSaveTimeoutMs);
    lastCloudSavedAt = pending.payload.savedAt;
    clearPendingQueue();
    console.log('Pending queue flushed successfully');
  } catch (e) {
    console.warn('Pending queue flush failed, will retry next time:', e);
  }
}

async function cloudSave() {
  // 락: 이미 실행 중이면 중복 실행 방지
  if (cloudSaveInFlight) return;
  cloudSaveInFlight = true;

  // 저장 시작 시각을 기록 → 직후 echo 리스너가 자기 변경을 다시 적용하지 않도록 사용
  lastLocalSaveAt = Date.now();
  setSaveStatus('saving');

  const payload = buildPayload();
  let lastError = null;

  // Firebase 실시간 리스너가 항상 최신 상태를 우리에게 push하므로
  // 저장 직전 별도 확인은 불필요. 바로 저장 진행.

  // 재시도 로직: 지수 백오프
  for (let attempt = 0; attempt <= RETRY_DELAYS.length; attempt++) {
    try {
      await cloudPutOnce(payload, CONFIG.cloudSaveTimeoutMs);
      // 성공
      lastCloudSavedAt = payload.savedAt;
      lastLocalSaveAt = Date.now();
      setSaveStatus('saved');
      cloudSaveInFlight = false;
      // 이전에 실패해서 큐에 있던 데이터도 같이 비우기 (현재 저장으로 갱신됐으므로)
      clearPendingQueue();
      return;
    } catch (e) {
      lastError = e;
      console.warn(`Cloud save attempt ${attempt + 1} failed:`, e);
      // 마지막 시도가 아니면 대기 후 재시도
      if (attempt < RETRY_DELAYS.length) {
        await new Promise(resolve => setTimeout(resolve, RETRY_DELAYS[attempt]));
      }
    }
  }

  // 모든 재시도 실패
  console.error('Cloud save failed after all retries:', lastError);
  setSaveStatus('error');
  // 데이터 보존: 큐에 저장 → 다음 접속 시 재전송
  savePendingQueue(payload);
  cloudSaveInFlight = false;
}

// 즉시 저장 (debounce 무시) - 페이지 닫힐 때나 백그라운드 갈 때 사용
async function cloudSaveImmediate() {
  // 대기 중인 debounce 타이머가 있으면 취소
  if (cloudSaveTimer) {
    clearTimeout(cloudSaveTimer);
    cloudSaveTimer = null;
  }
  // 로컬은 동기적으로 즉시 저장
  saveLocal();
  // 클라우드 저장 시도
  await cloudSave();
}

// 페이지가 진짜 닫힐 때 - Firebase set 비동기 호출 (페이지 unload 중에도 큐잉됨)
function cloudSaveBeacon() {
  // 중복 발동 방지 (pagehide와 beforeunload가 같이 발동될 수 있음)
  if (beaconFired) return;
  beaconFired = true;
  setTimeout(() => { beaconFired = false; }, 3000);

  // 대기 중인 debounce 타이머가 있으면 취소
  if (cloudSaveTimer) {
    clearTimeout(cloudSaveTimer);
    cloudSaveTimer = null;
  }
  // 이미 정상 저장 중이면 굳이 또 보낼 필요 없음
  if (cloudSaveInFlight) {
    saveLocal();  // 로컬은 그래도 한 번 더 저장
    return;
  }

  // 로컬 저장은 동기적으로 확실히 수행
  saveLocal();

  // Firebase가 준비 안 됐으면 큐에 저장만 하고 끝
  if (!window.fb || !window.fb.ready) {
    savePendingQueue(buildPayload());
    return;
  }

  const payload = buildPayload();

  // Firebase set은 백그라운드에서도 어느 정도 보장됨
  // 실패 시를 대비해 로컬 큐에도 저장
  try {
    window.fb.set(window.fb.ref(window.fb.db, CONFIG.fbDataPath), payload)
      .then(() => {
        lastCloudSavedAt = payload.savedAt;
        clearPendingQueue();
      })
      .catch(e => {
        console.warn('Beacon save failed:', e);
        savePendingQueue(payload);
      });
    lastLocalSaveAt = Date.now();
  } catch (e) {
    console.warn('Beacon save error:', e);
    savePendingQueue(payload);
  }
}

function fetchWithTimeout(url, ms) {
  return new Promise((resolve, reject) => {
    const ctrl = new AbortController();
    const timer = setTimeout(() => { ctrl.abort(); reject(new Error('timeout')); }, ms);
    fetch(url, { signal: ctrl.signal })
      .then(r => { clearTimeout(timer); resolve(r); })
      .catch(e => { clearTimeout(timer); reject(e); });
  });
}

let lastGoodProxy = 0;
async function fetchICal(url) {
  let lastErr = null;
  for (let i = 0; i < PROXIES.length; i++) {
    const idx = (lastGoodProxy + i) % PROXIES.length;
    try {
      const resp = await fetchWithTimeout(PROXIES[idx](url), 8000);
      if (!resp.ok) { lastErr = `HTTP ${resp.status}`; continue; }
      const text = await resp.text();
      if (!text.includes('BEGIN:VCALENDAR')) { lastErr = '응답 형식 오류'; continue; }
      lastGoodProxy = idx;
      return { ok: true, text };
    } catch (e) { lastErr = e.message || String(e); }
  }
  return { ok: false, error: lastErr };
}

function parseICal(text) {
  const lines = text.replace(/\r\n[ \t]/g, '').split(/\r?\n/);
  const events = [];
  let cur = null;
  for (const line of lines) {
    if (line === 'BEGIN:VEVENT') cur = {};
    else if (line === 'END:VEVENT') {
      if (cur && cur.start && cur.end) events.push(cur);
      cur = null;
    } else if (cur) {
      const i = line.indexOf(':');
      if (i < 0) continue;
      const key = line.slice(0, i).split(';')[0];
      const val = line.slice(i + 1);
      if (key === 'DTSTART') cur.start = fmtICalDate(val);
      else if (key === 'DTEND') cur.end = fmtICalDate(val);
      else if (key === 'UID') cur.uid = val;
      else if (key === 'SUMMARY') cur.summary = val;
    }
  }
  return events;
}

function fmtICalDate(v) {
  const s = String(v).slice(0, 8);
  if (s.length !== 8) return v;
  return `${s.slice(0,4)}-${s.slice(4,6)}-${s.slice(6,8)}`;
}

// iCal 결과 캐시 - 3분 안에 같은 요청은 캐시 사용
const icalCache = new Map(); // url -> {text, ts}
const ICAL_CACHE_MS = 3 * 60 * 1000; // 3분

async function fetchICalCached(url, force) {
  if (!force) {
    const cached = icalCache.get(url);
    if (cached && (Date.now() - cached.ts) < ICAL_CACHE_MS) {
      return { ok: true, text: cached.text, fromCache: true };
    }
  }
  const r = await fetchICal(url);
  if (r.ok) {
    icalCache.set(url, { text: r.text, ts: Date.now() });
  }
  return r;
}

async function syncICal(force) {
  if (state.rooms.length === 0) return;
  setStatus(t('statusSyncing'), 'syncing');

  const sources = [];
  for (const room of state.rooms) {
    for (const src of (room.icalSources || [])) {
      if (src.url) sources.push({ room, src });
    }
  }

  const results = await Promise.all(
    sources.map(({ room, src }) =>
      fetchICalCached(src.url, force).then(r => ({ room, src, r }))
    )
  );

  const newBookings = [];
  const errors = [];
  const seen = new Set();

  for (const { room, src, r } of results) {
    if (!r.ok) {
      errors.push({ name: `${room.name} (${src.platform})`, error: r.error });
      continue;
    }
    try {
      const events = parseICal(r.text);
      for (const ev of events) {
        if (!ev.start || !ev.end) continue;
        const key = `${room.id}|${ev.start}|${ev.end}`;
        if (seen.has(key)) continue;
        seen.add(key);
        newBookings.push({
          roomId: room.id,
          checkin: ev.start,
          checkout: ev.end,
          summary: (ev.summary || 'Reserved').trim(),
          platform: src.platform,
        });
      }
    } catch (e) {
      errors.push({ name: `${room.name} (${src.platform})`, error: '파싱 실패: ' + e.message });
    }
  }

  state.icalBookings = newBookings;
  state.syncErrors = errors;
  state.syncedAt = new Date().toISOString();

  // 어제까지의 청소를 자동으로 로그에 보존 (변경 있을 때만 저장)
  const archived = archiveCleaningsToLog();
  if (archived) {
    saveLocal();
    cloudSaveDebounced();
  }

  setStatus(t('statusSynced'), '');
  render();
}

function getAllBookings() {
  const result = [];
  const manualKeys = new Set();
  for (const m of state.manualBookings) {
    const key = `${m.roomId}|${m.checkin}|${m.checkout}`;
    manualKeys.add(key);
    result.push({
      roomId: m.roomId,
      checkin: m.checkin,
      checkout: m.checkout,
      summary: m.summary || '직접 예약',
      platform: 'direct',
      isManual: true,
      manualId: m.id,
    });
  }
  for (const b of state.icalBookings) {
    const key = `${b.roomId}|${b.checkin}|${b.checkout}`;
    if (manualKeys.has(key)) continue;
    result.push({ ...b, isManual: false });
  }
  return result;
}

function getRoom(roomId) { return state.rooms.find(r => r.id === roomId); }
function getBranch(branchId) { return state.branches.find(b => b.id === branchId); }
function getStaff(staffId) { return state.staff.find(s => s.id === staffId); }
function noteKey(b) { return `${b.roomId}|${b.checkin}|${b.checkout}`; }
function getNote(b) { return state.notes[noteKey(b)] || {}; }

// 청소 예정일 계산 (cleanOffset 적용)
// cleanOffset: 0 = 체크아웃 당일, 1 = 다음날, -1 = 전날, 'skip' = 청소 안 함
function getCleaningDate(booking) {
  const note = getNote(booking);
  if (note.cleanOffset === 'skip') return null;
  const offset = typeof note.cleanOffset === 'number' ? note.cleanOffset : 0;
  const co = parseDate(booking.checkout);
  if (!co) return null;
  return addDays(co, offset);
}

function getCleaningStatus(booking) {
  const note = getNote(booking);
  if (note.cleanOffset === 'skip') return 'skip';
  const offset = typeof note.cleanOffset === 'number' ? note.cleanOffset : 0;
  if (offset === 0) return 'same';
  if (offset > 0) return 'later';
  return 'earlier';
}

// 특정 날짜에 청소 예정인 예약 모두 가져오기
function cleaningTasksForDate(date) {
  const dStr = fmtDate(date);
  const result = [];
  const all = getAllBookings();
  for (const b of all) {
    const cleanDate = getCleaningDate(b);
    if (!cleanDate) continue;
    if (fmtDate(cleanDate) !== dStr) continue;
    result.push(b);
  }
  return result;
}

// ════════════════════════════════════════════════════════════
// 공용공간 청소 (체크아웃 없이 추가하는 청소 일정)
// ════════════════════════════════════════════════════════════
// 각 항목은 "task" 객체로 통일된 인터페이스를 가짐:
//   { kind: 'common', id, date, branchId, label, cleanerId, memo }
// 기존 booking과 구분하기 위해 kind 필드를 사용

// 특정 날짜의 공용공간 청소 작업 가져오기
function commonCleaningsForDate(date) {
  const dStr = fmtDate(date);
  const list = state.commonAreaCleanings || [];
  return list.filter(c => c.date === dStr);
}

// 공용공간 청소를 booking-like task 형태로 정규화 (renderEvent와 호환)
// noteKey와 충돌하지 않게 'common|<id>' 형태의 고유 키 사용
function commonCleaningToTask(c) {
  return {
    kind: 'common',
    id: c.id,
    date: c.date,
    branchId: c.branchId,
    label: c.label || '',
    cleanerId: c.cleanerId || null,
    memo: c.memo || '',
  };
}

// 특정 날짜 모든 청소 작업 (체크아웃 청소 + 공용공간 청소)
// 반환값: [{ type: 'booking', booking } | { type: 'common', common }]
function allCleaningsForDate(date) {
  const result = [];
  for (const b of cleaningTasksForDate(date)) {
    result.push({ type: 'booking', booking: b });
  }
  for (const c of commonCleaningsForDate(date)) {
    result.push({ type: 'common', common: c });
  }
  return result;
}

// ════════════════════════════════════════════════════════════
// 청소 기록 - 지나간 날의 청소 정보를 자동 보존
// ════════════════════════════════════════════════════════════
const CLEANING_LOG_KEEP_DAYS = 14; // 14일치 보관

// 어제까지의 청소 정보를 cleaningLogs에 자동 기록
// (오늘이 지나간 날들을 매번 처리)
// 마지막으로 archive 풀스캔한 날짜 (메모리)
let lastArchiveDay = null;

function archiveCleaningsToLog() {
  if (!state.cleaningLogs) state.cleaningLogs = [];

  const today = new Date(); today.setHours(0,0,0,0);
  const todayStr = fmtDate(today);
  const cutoff = addDays(today, -CLEANING_LOG_KEEP_DAYS);
  const cutoffStr = fmtDate(cutoff);

  let changed = false;

  // 1. 오래된 기록 삭제 (14일 이전) - 매번 검사
  const before = state.cleaningLogs.length;
  state.cleaningLogs = state.cleaningLogs.filter(log => log.date >= cutoffStr);
  if (state.cleaningLogs.length !== before) changed = true;

  // 2. 어제 데이터 추가 - 새 날짜 됐을 때만 풀스캔, 아니면 어제 하나만
  const needFullScan = (lastArchiveDay !== todayStr);

  const existingKeys = new Set(state.cleaningLogs.map(l => `${l.date}|${l.roomId}|${l.checkin}`));

  // 새 날짜 됐으면 14일치 풀스캔, 아니면 어제만 (혹시 누락 보강용)
  const scanDays = needFullScan ? CLEANING_LOG_KEEP_DAYS : 1;

  for (let i = 1; i <= scanDays; i++) {
    const date = addDays(today, -i);
    const dStr = fmtDate(date);
    if (dStr < cutoffStr) break;

    const tasks = cleaningTasksForDate(date);
    for (const b of tasks) {
      const key = `${dStr}|${b.roomId}|${b.checkin}`;
      if (existingKeys.has(key)) continue;

      const room = getRoom(b.roomId);
      const branch = room ? getBranch(room.branchId) : null;
      const note = getNote(b);
      const cleaner = note.cleanerId ? getStaff(note.cleanerId) : null;

      state.cleaningLogs.push({
        date: dStr,
        roomId: b.roomId,
        checkin: b.checkin,
        checkout: b.checkout,
        roomName: room ? room.name : '?',
        branchId: room ? room.branchId : null,
        branchName: branch ? branch.name : '',
        branchColor: branch ? branch.color : '#999',
        cleanerId: note.cleanerId || null,
        cleanerName: cleaner ? cleaner.name : '',
        cleanerColor: cleaner ? cleaner.color : '#a89880',
        memo: note.memo || '',
      });
      existingKeys.add(key);
      changed = true;
    }

    // 공용공간 청소도 같이 보존
    // 기존 키 형식(`날짜|roomId|checkin`)과 충돌하지 않게 'common' prefix 사용
    const commons = commonCleaningsForDate(date);
    for (const c of commons) {
      const key = `${dStr}|common|${c.id}`;
      if (existingKeys.has(key)) continue;

      const branch = getBranch(c.branchId);
      const cleaner = c.cleanerId ? getStaff(c.cleanerId) : null;
      const labelText = c.label || t('commonLabelDefault');

      state.cleaningLogs.push({
        date: dStr,
        // 공용공간 청소 식별자: roomId 자리에 'common:<id>'를 넣어 기존 그룹핑 로직과 충돌 안 하게
        roomId: 'common:' + c.id,
        checkin: '',
        checkout: '',
        // 기록 화면에서는 roomName 자리에 라벨이 표시됨 → "🏠 공용공간 · 1층 복도" 형식
        roomName: `🏠 ${t('commonBadge')}${c.label ? ' · ' + c.label : ''}`,
        branchId: c.branchId,
        branchName: branch ? branch.name : '',
        branchColor: branch ? branch.color : '#999',
        cleanerId: c.cleanerId || null,
        cleanerName: cleaner ? cleaner.name : '',
        cleanerColor: cleaner ? cleaner.color : '#a89880',
        memo: c.memo || '',
        isCommon: true,  // 추후 필요시 구분용 플래그
      });
      existingKeys.add(key);
      changed = true;
    }
  }

  if (changed) {
    state.cleaningLogs.sort((a, b) => b.date.localeCompare(a.date));
  }
  lastArchiveDay = todayStr;
  return changed; // 변경 여부 반환
}

function setStatus(text, cls) {
  $('status-text').textContent = text;
  const dot = $('status-dot');
  dot.className = 'dot' + (cls ? ' ' + cls : ' ok');
}

function renderErrorBanner() {
  const errs = state.syncErrors || [];
  if (errs.length === 0) { errorArea.innerHTML = ''; return; }
  errorArea.innerHTML = `<div class="error-banner">
    <b>${t('syncFailedTitle', errs.length)}</b>
    <div class="err-detail">${errs.map(e => `• ${escapeHtml(e.name)}: ${escapeHtml(e.error)}`).join('<br>')}</div>
  </div>`;
}

function render() {
  try {
    const hasRooms = state.rooms.length > 0;
    const hasBranches = state.branches.length > 0;
    $('tabs').style.display = hasRooms && state.view !== 'setup' ? '' : 'none';
    $('btn-add-booking').style.display = hasRooms && state.view !== 'setup' ? '' : 'none';
    $('btn-add-common').style.display = hasBranches && state.view !== 'setup' ? '' : 'none';
    renderErrorBanner();
    if (state.view === 'setup') return renderSetup();
    if (!hasRooms) return renderFirstSetup();
    if (state.view === 'today') return renderToday();
    if (state.view === 'tomorrow') return renderTomorrow();
    if (state.view === 'dayDetail') return renderDayDetailView();
    if (state.view === 'bystaff') return renderByStaff();
    if (state.view === 'week') return renderTimeline();
    if (state.view === 'logs') return renderLogs();
    if (state.view === 'ops') return renderOps();
    if (state.view === 'all') return renderAll();
  } catch (e) {
    console.error('Render error:', e);
    main.innerHTML = `<div class="error-banner">
      <b>${t('renderError')}</b>
      <div class="err-detail">${escapeHtml(e.message || String(e))}</div>
    </div>`;
  }
}

function renderFirstSetup() {
  main.innerHTML = `<div class="info-msg">
    <b>${t('welcome')}</b>
    ${t('welcomeMsg')}
    <br><br>
    <button class="btn-icon btn-add" onclick="goSetup()">${t('welcomeBtn')}</button>
  </div>`;
}
window.goSetup = () => { state.view = 'setup'; render(); };

function renderToday() {
  const today = new Date(); today.setHours(0,0,0,0);
  renderDayDetail(today, t('todayLabel'), 'today', t('todayTag'));
}
function renderTomorrow() {
  const today = new Date(); today.setHours(0,0,0,0);
  renderDayDetail(addDays(today, 1), t('tomorrowLabel'), 'tomorrow', t('tomorrowTag'));
}

// 직원별 화면에서 날짜 선택 시 진입하는 상세 화면
// 기존 renderDayDetail을 그대로 재사용하고, 끝에 뒤로가기 버튼만 추가
function renderDayDetailView() {
  if (!state.dayDetailDate) {
    // 날짜 없으면 안전하게 직원별로 복귀
    state.view = 'bystaff';
    return render();
  }
  const date = parseDate(state.dayDetailDate);
  if (!date) {
    state.view = 'bystaff';
    return render();
  }
  const today = new Date(); today.setHours(0,0,0,0);
  const isToday = sameDate(date, today);
  const isTomorrow = sameDate(date, addDays(today, 1));

  // 날짜에 맞는 라벨/태그 선택 (오늘이면 오늘로, 내일이면 내일로, 그 외엔 일반 라벨)
  let dayLabel, tagClass, tagText;
  if (isToday) {
    dayLabel = t('todayLabel');
    tagClass = 'today';
    tagText = t('todayTag');
  } else if (isTomorrow) {
    dayLabel = t('tomorrowLabel');
    tagClass = 'tomorrow';
    tagText = t('tomorrowTag');
  } else {
    // 기타 날짜: "11/15(토)" 같은 라벨 사용
    const dowText = currentLang === 'ko' ? dowKR(date) : t('dow' + ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][date.getDay()]);
    const md = `${date.getMonth() + 1}/${date.getDate()}`;
    dayLabel = t('dayDetailLabel', md, dowText);
    // 과거 / 미래 구분 (CSS 클래스는 기존 today/tomorrow 재사용해서 안전하게)
    const isPast = date < today;
    tagClass = isPast ? 'tomorrow' : 'today';  // 색상만 비슷하게
    tagText = '';  // 별도 태그 텍스트 없음
  }

  renderDayDetail(date, dayLabel, tagClass, tagText);
  // 메인 화면 위에 뒤로가기 버튼 삽입 (renderDayDetail이 main.innerHTML로 모두 채운 뒤)
  const backLabel = t('dayDetailBack');
  const backBar = document.createElement('div');
  backBar.className = 'daydetail-backbar';
  backBar.innerHTML = `<button class="daydetail-back-btn" id="btn-daydetail-back">${escapeHtml(backLabel)}</button>`;
  main.insertBefore(backBar, main.firstChild);
  const btn = $('btn-daydetail-back');
  if (btn) btn.onclick = () => {
    const back = state.dayDetailFromView || 'bystaff';
    state.view = back;
    state.dayDetailDate = null;
    state.dayDetailFromView = null;
    render();
  };
}

function renderDayDetail(date, dayLabel, tagClass, tagText) {
  const dStr = fmtDate(date);
  const all = getAllBookings();
  const checkoutsToday = [];
  const cleaningsToday = cleaningTasksForDate(date);
  const commonCleanings = commonCleaningsForDate(date);
  const checkins = [];
  const stays = [];
  for (const b of all) {
    const room = getRoom(b.roomId);
    if (!room) continue;
    if (b.checkout === dStr) checkoutsToday.push(b);
    if (b.checkin === dStr) checkins.push(b);
    const ci = parseDate(b.checkin);
    const co = parseDate(b.checkout);
    if (ci && co && date > ci && date < co) stays.push(b);
  }

  const dowText = currentLang === 'ko' ? `${dowKR(date)}요일` : t('dow' + ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][date.getDay()]);

  let html = `<div class="day-header">
    <span class="day-date">${prettyDate(date)}</span>
    <span class="day-dow">${dowText}</span>
    <span class="day-tag ${tagClass}">${tagText}</span>
  </div>`;

  // 청소 섹션: 체크아웃 청소 + 공용공간 청소를 합쳐서 표시
  const totalCleaningCount = cleaningsToday.length + commonCleanings.length;
  if (totalCleaningCount > 0) {
    html += `<div class="section">
      <div class="section-title">${t('todayCleaning', dayLabel)} <span class="section-count">${totalCleaningCount}</span></div>
      ${cleaningsToday.map(b => renderEvent(b, 'checkout')).join('')}
      ${commonCleanings.map(c => renderCommonCleaning(c)).join('')}
    </div>`;
  } else {
    // 빈 상태도 기존과 동일하게 유지
    html += renderSection(t('todayCleaning', dayLabel), [], 'checkout');
  }

  const movedCheckouts = checkoutsToday.filter(b => {
    const status = getCleaningStatus(b);
    return status !== 'same';
  });
  if (movedCheckouts.length > 0) {
    html += `<div class="section">
      <div class="section-title">${t('cleaningOnOtherDay', dayLabel)} <span class="section-count">${movedCheckouts.length}</span></div>
      ${movedCheckouts.map(b => renderEvent(b, 'checkout-moved')).join('')}
    </div>`;
  }

  html += renderSection(t('todayCheckin', dayLabel), checkins, 'checkin');
  html += renderDayMemoSection(dStr);

  if (stays.length > 0) {
    html += `<div class="section">
      <div class="section-title">${t('todayStay', dayLabel)} <span class="section-count">${stays.length}</span></div>
      ${stays.map(b => renderEvent(b, 'stay')).join('')}
    </div>`;
  }

  main.innerHTML = html;
  attachDayMemoHandler(dStr);
}

function renderDayMemoSection(dateStr) {
  const memo = (state.dayMemo || {})[dateStr] || '';
  return `<div class="section">
    <div class="section-title">${t('memoTitle')}</div>
    <div class="daymemo-wrap">
      <textarea id="daymemo-${dateStr}" class="daymemo-input" 
        placeholder="${escapeHtml(t('memoPlaceholder'))}">${escapeHtml(memo)}</textarea>
      <div class="daymemo-saved" id="daymemo-saved-${dateStr}">${memo ? t('memoSaved') : ''}</div>
    </div>
  </div>`;
}

function attachDayMemoHandler(dateStr) {
  const input = document.getElementById(`daymemo-${dateStr}`);
  if (!input) return;
  const savedLabel = document.getElementById(`daymemo-saved-${dateStr}`);
  // 자동 높이 조절
  const autoResize = () => {
    input.style.height = 'auto';
    input.style.height = (input.scrollHeight + 2) + 'px';
  };
  autoResize();
  setTimeout(autoResize, 0);
  let saveTimer = null;
  input.oninput = () => {
    autoResize();
    if (savedLabel) savedLabel.textContent = t('memoTyping');
    if (saveTimer) clearTimeout(saveTimer);
    saveTimer = setTimeout(() => {
      const val = input.value.trim();
      if (!state.dayMemo) state.dayMemo = {};
      if (val) state.dayMemo[dateStr] = val;
      else delete state.dayMemo[dateStr];
      saveLocal();
      cloudSaveDebounced();
      if (savedLabel) savedLabel.textContent = val ? t('memoSaved') : '';
    }, 400);
  };
}

function renderSection(title, bookings, type) {
  let html = `<div class="section">
    <div class="section-title">${escapeHtml(title)} <span class="section-count">${bookings.length}</span></div>`;
  if (bookings.length === 0) {
    html += `<div class="empty-msg">${t('none')}</div>`;
  } else {
    html += bookings.map(b => renderEvent(b, type)).join('');
  }
  html += `</div>`;
  return html;
}

function renderEvent(booking, type) {
  const room = getRoom(booking.roomId);
  if (!room) return '';
  const branch = getBranch(room.branchId);
  const note = getNote(booking);

  // 손님이 알려준 시간만 표시
  const customTime = (type === 'checkout' || type === 'checkout-moved') ? note.checkoutTime
                   : type === 'checkin' ? note.checkinTime
                   : null;

  const branchColor = branch ? branch.color : '#999';
  const branchTag = branch
    ? `<span class="branch-tag" style="background:${branchColor};">${escapeHtml(branch.name)}</span>`
    : '';
  const platform = ({ airbnb:'🏠', booking:'🔵', agoda:'🟠', vrbo:'🟢', direct:'📝', other:'📅' })[booking.platform] || '🏠';

  let badge = '';
  if (type === 'checkout' || type === 'checkout-moved') {
    badge = `<span class="badge checkout">${t('checkout')}</span>`;
  } else if (type === 'checkin') {
    badge = `<span class="badge checkin">${t('checkin')}</span>`;
  }

  // 청소 상태 (체크아웃 + 청소 표시 항목에만)
  let cleanStatusHtml = '';
  if (type === 'checkout' || type === 'checkout-moved') {
    const status = getCleaningStatus(booking);
    const offset = note.cleanOffset;
    const co = parseDate(booking.checkout);
    if (status === 'skip') {
      cleanStatusHtml = `<span class="clean-status skip">${t('cleanStatusSkip')}</span>`;
    } else if (status === 'later' && co) {
      const cleanDate = addDays(co, offset);
      const w = currentLang === 'ko' ? dowKR(cleanDate) : t('dow' + ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][cleanDate.getDay()]);
      cleanStatusHtml = `<span class="clean-status later">${t('cleanStatusLater', prettyDate(cleanDate), w)}</span>`;
    } else if (status === 'earlier' && co) {
      const cleanDate = addDays(co, offset);
      const w = currentLang === 'ko' ? dowKR(cleanDate) : t('dow' + ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][cleanDate.getDay()]);
      cleanStatusHtml = `<span class="clean-status earlier">${t('cleanStatusEarlier', prettyDate(cleanDate), w)}</span>`;
    }
  }

  let cleanerHtml = '';
  if (type === 'checkout') {
    if (note.cleanerId) {
      const s = getStaff(note.cleanerId);
      if (s) cleanerHtml = `<div class="cleaner-tag" style="background:${s.color};">🧹 ${escapeHtml(s.name)}</div>`;
    } else {
      cleanerHtml = `<div class="cleaner-tag unassigned">${t('cleanerUnassigned')}</div>`;
    }
  }
  const memoHtml = note.memo ? `<div class="memo-tag">📝 ${escapeHtml(note.memo)}</div>` : '';

  const timeHtml = customTime
    ? `<span class="time-tag custom">⏰ ${escapeHtml(customTime)}</span>`
    : '';

  return `<div class="event" style="border-left-color:${branchColor};" data-key="${escapeHtml(noteKey(booking))}">
    <div class="event-row">
      ${badge}
      ${branchTag}
      <span class="room-name">${escapeHtml(room.name)}</span>
      <span class="platform">${platform}</span>
      ${timeHtml}
    </div>
    ${cleanStatusHtml ? '<div style="margin-top:6px;">' + cleanStatusHtml + '</div>' : ''}
    ${cleanerHtml}
    ${memoHtml}
  </div>`;
}

// 공용공간 청소 카드 렌더링 (기존 renderEvent와 비슷한 형태)
function renderCommonCleaning(common) {
  const branch = getBranch(common.branchId);
  const branchColor = branch ? branch.color : '#999';
  const branchTag = branch
    ? `<span class="branch-tag" style="background:${branchColor};">${escapeHtml(branch.name)}</span>`
    : '';

function renderByStaff() {
  if (state.staff.length === 0) {
    main.innerHTML = `<div class="info-msg">
      <b>${t('byStaffNoStaff')}</b>
      ${t('byStaffNoStaffSub')}
      <br><br>
      <button class="btn-icon btn-add" onclick="goSetup()">${t('goToSetup')}</button>
    </div>`;
    return;
  }

  // 기본값: 첫 번째 직원
  if (!state.selectedStaffId
      || (state.selectedStaffId !== '__unassigned__'
          && state.selectedStaffId !== '__all__'
          && !getStaff(state.selectedStaffId))) {
    state.selectedStaffId = state.staff[0].id;
  }
  // 기본값: 이번 달
  if (!state.bystaffMonth) {
    const _today = new Date();
    state.bystaffMonth = new Date(_today.getFullYear(), _today.getMonth(), 1);
  }
  if (!state.bystaffAllRange) state.bystaffAllRange = '1w';

  // 직원 선택 버튼들
  let staffSelector = '<div class="bystaff-selector">';
  const allSel = state.selectedStaffId === '__all__';
  staffSelector += `<button class="bystaff-pill ${allSel ? 'active-all' : ''}" data-sid="__all__">
    ${t('pillAll')}
  </button>`;
  state.staff.forEach(s => {
    const sel = state.selectedStaffId === s.id;
    staffSelector += `<button class="bystaff-pill ${sel ? 'active' : ''}" data-sid="${s.id}"
      style="${sel ? `background:${s.color}; color:white; border-color:${s.color};` : `border-color:${s.color}; color:${s.color};`}">
      🧹 ${escapeHtml(s.name)}
    </button>`;
  });
  const unsel = state.selectedStaffId === '__unassigned__';
  staffSelector += `<button class="bystaff-pill ${unsel ? 'active-unassigned' : ''}" data-sid="__unassigned__">
    ${t('pillUnassigned')}
  </button>`;
  staffSelector += '</div>';

  if (state.selectedStaffId === '__all__') {
    renderByStaffAll(staffSelector);
  } else {
    renderByStaffSingle(staffSelector);
  }

  // 직원 선택 핸들러
  document.querySelectorAll('.bystaff-pill').forEach(btn => {
    btn.onclick = () => {
      state.selectedStaffId = btn.dataset.sid;
      render();
    };
  });
}

function renderTimeline() {
  const today = new Date(); today.setHours(0,0,0,0);
  const days = 14;  // 항상 2주
  const dates = [];
  for (let i = 0; i < days; i++) dates.push(addDays(today, i));

  const all = getAllBookings();

  const branchGroups = {};
  state.branches.forEach(b => { branchGroups[b.id] = []; });
  state.rooms.forEach(r => {
    if (!branchGroups[r.branchId]) branchGroups[r.branchId] = [];
    branchGroups[r.branchId].push(r);
  });

  const colsTemplate = `100px repeat(${days}, 1fr)`;
  const minWidth = '900px';
  let html = '';

  html += `<div class="tl-container"><div class="tl-row tl-head" style="grid-template-columns:${colsTemplate}; min-width:${minWidth};">
    <div class="tl-room">${t('timelineRoom')}</div>`;
  dates.forEach(d => {
    const isToday = sameDate(d, today);
    const dowKey = ['dowSun','dowMon','dowTue','dowWed','dowThu','dowFri','dowSat'][d.getDay()];
    const dow = currentLang === 'ko' ? dowKR(d) : t(dowKey);
    const cls = d.getDay() === 0 ? 'sun' : (d.getDay() === 6 ? 'sat' : '');
    html += `<div class="tl-day ${isToday ? 'today' : ''} ${cls}">
      <div class="tl-day-dow">${dow}</div>
      <div class="tl-day-num">${d.getDate()}</div>
    </div>`;
  });
  html += `</div>`;

  for (const branch of state.branches) {
    const rooms = branchGroups[branch.id] || [];
    if (rooms.length === 0) continue;
    html += `<div class="tl-row" style="grid-template-columns:${colsTemplate}; min-width:${minWidth};">
      <div class="tl-house-sep" style="background:${branch.color};">${escapeHtml(branch.name)}</div>
    </div>`;
    for (const room of rooms) {
      html += renderTimelineRow(room, branch, dates, all, days, minWidth);
    }
  }
  const noBranchRooms = state.rooms.filter(r => !state.branches.find(b => b.id === r.branchId));
  if (noBranchRooms.length > 0) {
    html += `<div class="tl-row" style="grid-template-columns:${colsTemplate}; min-width:${minWidth};">
      <div class="tl-house-sep" style="background:#999;">${t('branchOther')}</div>
    </div>`;
    for (const room of noBranchRooms) {
      html += renderTimelineRow(room, { color: '#999' }, dates, all, days, minWidth);
    }
  }

  html += `</div>`;
  main.innerHTML = html;
}
window.setWeekRange = (r) => { state.weekRange = r; render(); };

function renderTimelineRow(room, branch, dates, allBookings, numDays, minWidth) {
  const startDate = dates[0];
  const endDate = dates[dates.length - 1];
  const today = new Date(); today.setHours(0,0,0,0);

  const bars = [];
  for (const b of allBookings) {
    if (b.roomId !== room.id) continue;
    const ci = parseDate(b.checkin);
    const co = parseDate(b.checkout);
    if (!ci || !co) continue;
    if (co < startDate) continue;
    if (ci > endDate) continue;
    const startIdx = Math.max(0, Math.floor((ci - startDate) / 86400000));
    const coIdx = Math.floor((co - startDate) / 86400000);
    const endIdx = Math.min(numDays - 1, coIdx - 1);
    if (endIdx < startIdx) continue;
    bars.push({ b, startIdx, endIdx });
  }

  let cellsHtml = '';
  dates.forEach(d => {
    const isToday = sameDate(d, today);
    const isWeekend = d.getDay() === 0 || d.getDay() === 6;
    cellsHtml += `<div class="tl-cell ${isToday ? 'today' : ''} ${isWeekend ? 'weekend' : ''}"></div>`;
  });

  let barsHtml = '';
  bars.forEach(({ b, startIdx, endIdx }) => {
    const leftPct = (startIdx / numDays) * 100;
    const widthPct = ((endIdx - startIdx + 1) / numDays) * 100;
    const note = getNote(b);
    let cleanerDot = '';
    if (note.cleanerId) {
      const s = getStaff(note.cleanerId);
      if (s) cleanerDot = `<span class="tl-bar-cleaner" style="background:${s.color};" title="${escapeHtml(s.name)}"></span>`;
    }
    const platform = ({ airbnb:'🏠', booking:'🔵', agoda:'🟠', vrbo:'🟢', direct:'📝', other:'📅' })[b.platform] || '🏠';
    barsHtml += `<div class="tl-bar event"
      style="left:calc(100px + (100% - 100px) * ${leftPct / 100}); width:calc((100% - 100px) * ${widthPct / 100} - 2px); background:${branch.color};"
      data-key="${escapeHtml(noteKey(b))}"
      title="${escapeHtml(room.name)}: ${b.checkin} ~ ${b.checkout}">
      <span>${platform}</span>
      ${cleanerDot}
    </div>`;
  });

  const cols = `100px repeat(${numDays}, 1fr)`;
  return `<div class="tl-row" style="grid-template-columns:${cols}; min-width:${minWidth};">
    <div class="tl-room" style="border-left: 4px solid ${branch.color};">${escapeHtml(room.name)}</div>
    ${cellsHtml}
    ${barsHtml}
  </div>`;
}

// 운영정보 (Ops) - 비밀번호, 공유사항 등
// ════════════════════════════════════════════════════════════

// 청소 기록 (Logs) - 지난 14일 자동 보존
// ════════════════════════════════════════════════════════════
function renderLogs() {
  // 화면 진입 시 한 번 더 archive (변경 있을 때만 저장)
  const archived = archiveCleaningsToLog();
  if (archived) {
    saveLocal();
    cloudSaveDebounced();
  }

  const logs = state.cleaningLogs || [];

  let html = `<h2 style="font-family:'Georgia',serif; font-size:22px; margin-bottom:6px;">${t('logsTitle')}</h2>
    <p style="font-size:12px; color:var(--ink-soft); margin-bottom:14px;">${t('logsSub')}</p>`;

  if (logs.length === 0) {
    html += `<div class="info-msg">${t('logsEmpty')}</div>`;
    main.innerHTML = html;
    return;
  }

  // 날짜별로 그룹핑
  const byDate = {};
  logs.forEach(log => {
    if (!byDate[log.date]) byDate[log.date] = [];
    byDate[log.date].push(log);
  });
  const dates = Object.keys(byDate).sort().reverse(); // 최근부터

  dates.forEach(dStr => {
    const date = parseDate(dStr);
    const dowKey = ['dowSun','dowMon','dowTue','dowWed','dowThu','dowFri','dowSat'][date.getDay()];
    const dowText = currentLang === 'ko' ? `${dowKR(date)}요일` : t(dowKey);
    const items = byDate[dStr];

    html += `<div class="day-header">
      <span class="day-date">${prettyDate(date)}</span>
      <span class="day-dow">${dowText}</span>
      <span class="day-tag" style="background:#8a7860">${items.length}</span>
    </div>`;

    html += `<div class="logs-day">`;
    // 담당자별 그룹핑 (시각적으로 깔끔)
    const byCleanerId = {};
    items.forEach(log => {
      const k = log.cleanerId || '__none__';
      if (!byCleanerId[k]) byCleanerId[k] = [];
      byCleanerId[k].push(log);
    });
    Object.keys(byCleanerId).forEach(k => {
      const arr = byCleanerId[k];
      const first = arr[0];
      const cleanerName = first.cleanerName || t('logsCleanerNone');
      const cleanerColor = first.cleanerColor || '#a89880';
      const isUnassigned = !first.cleanerId;

      html += `<div class="logs-group" style="border-left:4px solid ${cleanerColor};">
        <div class="logs-cleaner" style="${isUnassigned ? 'background:#f5f0e8; color:#8a7860;' : `background:${cleanerColor}; color:white;`}">
          🧹 ${escapeHtml(cleanerName)} <span class="logs-count">${arr.length}</span>
        </div>
        <div class="logs-rooms">`;
      arr.forEach(log => {
        html += `<div class="logs-room">
          <span class="branch-tag" style="background:${log.branchColor};">${escapeHtml(log.branchName || '')}</span>
          <span class="logs-room-name">${escapeHtml(log.roomName)}</span>
          ${log.memo ? `<span class="logs-memo">📝 ${escapeHtml(log.memo)}</span>` : ''}
        </div>`;
      });
      html += `</div></div>`;
    });
    html += `</div>`;
  });

  main.innerHTML = html;
}

    <p style="font-size:12px; color:var(--ink-soft); margin-bottom:14px;">${t('opsSub')}</p>`;

  if (state.opsSections.length === 0) {
    html += `<div class="info-msg" style="margin-bottom:14px;">
      📌 첫 섹션을 추가해서 시작하세요.
      <br><small>예: 1층, 반지하, 와이파이, 도어록 등</small>

    html += `<div class="ops-section" data-ops-idx="${i}">

      textarea.style.height = 'auto';
      textarea.style.height = (textarea.scrollHeight + 2) + 'px';

          state.opsSections[idx].title = input.value;
          saveLocal();
          cloudSaveDebounced();

  $('btn-add-ops-section').onclick = () => {
    state.opsSections.push({
      id: 'ops_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6),
      title: '',
      content: '',
    });
    saveLocal();
    cloudSaveDebounced();
    render();
  };
}

function renderAll() {
  const today = new Date(); today.setHours(0,0,0,0);
  let html = '';
  let any = false;
  for (let i = 0; i < 30; i++) {
    const d = addDays(today, i);
    const dStr = fmtDate(d);
    const cleanings = cleaningTasksForDate(d);
    const all = getAllBookings();
    const checkins = all.filter(b => b.checkin === dStr);
    if (cleanings.length === 0 && checkins.length === 0) continue;
    any = true;
    const todayTag = i === 0 ? `<span class="day-tag today">TODAY</span>`
                  : i === 1 ? `<span class="day-tag tomorrow">TOMORROW</span>` : '';
    html += `<div class="day-header">
      <span class="day-date">${prettyDate(d)}</span>
      <span class="day-dow">${currentLang === 'ko' ? dowKR(d) + '요일' : t('dow' + ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()])}</span>
      ${todayTag}
    </div>`;
    if (cleanings.length > 0) {
      html += `<div class="section">
        <div class="section-title">🧹 청소 <span class="section-count">${cleanings.length}</span></div>
        ${cleanings.map(b => renderEvent(b, 'checkout')).join('')}
      </div>`;
    }
    if (checkins.length > 0) {
      html += `<div class="section">
        <div class="section-title">📥 체크인 <span class="section-count">${checkins.length}</span></div>
        ${checkins.map(b => renderEvent(b, 'checkin')).join('')}
      </div>`;
    }
  }
  if (!any) html = '<div class="empty-msg">앞으로 30일간 예약 없음</div>';
  main.innerHTML = html;
}

async function saveSetupHandler() {
  state.branches = state.branches.filter(b => b.name && b.name.trim());
  state.staff = state.staff.filter(s => s.name && s.name.trim());
  state.rooms = state.rooms
    .filter(r => r.name && r.name.trim())
    .map(r => ({
      ...r,
      icalSources: (r.icalSources || []).filter(s => s.url && s.url.trim()),
    }));

  if (state.branches.length === 0) { alert(t('needBranch')); return; }
  if (state.rooms.length === 0) { alert(t('needRoom')); return; }

  const byRoomName = {};
  state.rooms.forEach(r => {
    const k = `${r.branchId}|${(r.name || '').trim()}`;
    if (!byRoomName[k]) {
      byRoomName[k] = { ...r, icalSources: [...(r.icalSources || [])] };
    } else {
      const existing = new Set(byRoomName[k].icalSources.map(s => s.url));
      (r.icalSources || []).forEach(s => {
        if (!existing.has(s.url)) {
          byRoomName[k].icalSources.push(s);
          existing.add(s.url);
        }
      });
    }
  });
  state.rooms = Object.values(byRoomName);

  saveLocal();
  cloudSyncPaused = true;
  await cloudSave();
  cloudSyncPaused = false;

  state.view = 'today';
  render();
  await syncICal();
}

function openBookingModal(key) {
  state.bookingModalKey = key;
  const [roomId, ci, co] = key.split('|');
  const room = getRoom(roomId);
  const note = state.notes[key] || {};

  $('bm-title').textContent = room ? room.name : t('bookingModalTitle');
  const ciDate = parseDate(ci);
  const coDate = parseDate(co);
  $('bm-sub').textContent = `${prettyDate(ciDate)} (${dowKR(ciDate)}) → ${prettyDate(coDate)} (${dowKR(coDate)})`;
  $('bm-checkin-time').value = note.checkinTime || '';
  $('bm-checkout-time').value = note.checkoutTime || '';
  $('bm-memo').value = note.memo || '';
  state.cleanerSelectedId = note.cleanerId || null;
  renderCleanerChips('bm-cleaners', state.cleanerSelectedId, (sid) => {
    state.cleanerSelectedId = sid;
  });

  // 청소일 영역 (체크아웃이 있는 예약에만 표시)
  state.tempCleanOffset = (note.cleanOffset !== undefined) ? note.cleanOffset : 0;
  $('bm-cleaning-field').style.display = '';
  renderCleaningDateInfo();

  const all = getAllBookings();
  const found = all.find(b => noteKey(b) === key);
  $('bm-delete').style.display = (found && found.isManual) ? '' : 'none';

  $('booking-modal').classList.add('open');
}

function renderCleaningDateInfo() {
  const info = $('bm-cleaning-info');
  const offset = state.tempCleanOffset;
  if (!state.bookingModalKey) return;
  const [, , co] = state.bookingModalKey.split('|');
  const coDate = parseDate(co);
  if (offset === 'skip') {
    info.className = 'cleaning-date-info skip';
    info.innerHTML = t('cleaningSkip');
  } else {
    const cleanDate = addDays(coDate, offset);
    let label;
    if (offset === 0) label = t('cleaningSameDay');
    else if (offset === 1) label = t('cleaningNextDay');
    else if (offset === -1) label = t('cleaningPrevDay');
    else if (offset > 0) label = t('cleaningPlus', offset);
    else label = t('cleaningMinus', offset);
    const dowText = currentLang === 'ko' ? dowKR(cleanDate) : t('dow' + ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][cleanDate.getDay()]);
    info.className = 'cleaning-date-info';
    info.innerHTML = `📅 <strong>${prettyDate(cleanDate)} (${dowText})</strong> · ${label}`;
  }
}

$('bm-clean-prev').onclick = () => {
  if (state.tempCleanOffset === 'skip') state.tempCleanOffset = 0;
  state.tempCleanOffset -= 1;
  renderCleaningDateInfo();
};
$('bm-clean-next').onclick = () => {
  if (state.tempCleanOffset === 'skip') state.tempCleanOffset = 0;
  state.tempCleanOffset += 1;
  renderCleaningDateInfo();
};
$('bm-clean-reset').onclick = () => {
  state.tempCleanOffset = 0;
  renderCleaningDateInfo();
};
$('bm-clean-skip').onclick = () => {
  state.tempCleanOffset = (state.tempCleanOffset === 'skip') ? 0 : 'skip';

};

$('bm-cancel').onclick = closeBookingModal;
$('bm-save').onclick = () => {
  if (!state.bookingModalKey) return;
  const key = state.bookingModalKey;
  const checkinTime = $('bm-checkin-time').value.trim();
  const checkoutTime = $('bm-checkout-time').value.trim();
  const memo = $('bm-memo').value.trim();
  const cleanerId = state.cleanerSelectedId;
  const cleanOffset = state.tempCleanOffset;
  const hasCleanOffset = cleanOffset === 'skip' || (typeof cleanOffset === 'number' && cleanOffset !== 0);

  if (!checkinTime && !checkoutTime && !memo && !cleanerId && !hasCleanOffset) {
    delete state.notes[key];
  } else {
    state.notes[key] = {
      checkinTime, checkoutTime, memo, cleanerId,
      cleanOffset: hasCleanOffset ? cleanOffset : undefined,
    };
  }
  saveLocal();
  cloudSaveDebounced();
  closeBookingModal();
  render();
};
$('bm-delete').onclick = () => {
  if (!confirm(t('deleteConfirm'))) return;
  const key = state.bookingModalKey;
  const all = getAllBookings();
  const found = all.find(b => noteKey(b) === key);
  if (found && found.isManual) {
    state.manualBookings = state.manualBookings.filter(m => m.id !== found.manualId);
    delete state.notes[key];
    saveLocal();
    cloudSaveDebounced();
  }

function openManualModal(existingId) {
  state.manualEditingId = existingId || null;
  $('mm-title').textContent = existingId ? t('manualModalEditTitle') : t('manualModalTitle');

  const sel = $('mm-room');
  sel.innerHTML = state.rooms.map(r => {
    const br = getBranch(r.branchId);
    return `<option value="${r.id}">${escapeHtml(br ? br.name + ' / ' : '')}${escapeHtml(r.name)}</option>`;
  }).join('');

  if (existingId) {
    const m = state.manualBookings.find(x => x.id === existingId);
    if (m) {
      sel.value = m.roomId;
      $('mm-checkin').value = m.checkin;
      $('mm-checkout').value = m.checkout;
      const note = state.notes[`${m.roomId}|${m.checkin}|${m.checkout}`] || {};
      $('mm-checkin-time').value = note.checkinTime || '';
      $('mm-checkout-time').value = note.checkoutTime || '';
      $('mm-memo').value = m.summary || note.memo || '';
      state.cleanerSelectedId = note.cleanerId || null;
    }
  } else {
    const today = new Date();
    $('mm-checkin').value = fmtDate(today);
    $('mm-checkout').value = fmtDate(addDays(today, 1));
    $('mm-checkin-time').value = '';
    $('mm-checkout-time').value = '';
    $('mm-memo').value = '';
    state.cleanerSelectedId = null;
  }

  renderCleanerChips('mm-cleaners', state.cleanerSelectedId, (sid) => {
    state.cleanerSelectedId = sid;
  });
  $('manual-modal').classList.add('open');
}

function closeManualModal() {
  $('manual-modal').classList.remove('open');

}

$('mm-cancel').onclick = closeManualModal;
$('mm-save').onclick = () => {
  const roomId = $('mm-room').value;
  const checkin = $('mm-checkin').value;
  const checkout = $('mm-checkout').value;
  const checkinTime = $('mm-checkin-time').value.trim();
  const checkoutTime = $('mm-checkout-time').value.trim();
  const memo = $('mm-memo').value.trim();

  if (!roomId || !checkin || !checkout) { alert(t('invalidInputs')); return; }
  if (checkin >= checkout) { alert(t('invalidDateOrder')); return; }

  if (state.manualEditingId) {
    const idx = state.manualBookings.findIndex(m => m.id === state.manualEditingId);
    if (idx >= 0) {
      const oldM = state.manualBookings[idx];
      const oldKey = `${oldM.roomId}|${oldM.checkin}|${oldM.checkout}`;
      const newKey = `${roomId}|${checkin}|${checkout}`;
      if (oldKey !== newKey && state.notes[oldKey]) {
        state.notes[newKey] = state.notes[oldKey];
        delete state.notes[oldKey];
      }
      state.manualBookings[idx] = {
        ...oldM, roomId, checkin, checkout, summary: memo || t('manualSummaryDefault'),
      };
    }
  } else {
    state.manualBookings.push({
      id: 'mb_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7),
      roomId, checkin, checkout,
      summary: memo || t('manualSummaryDefault'),
    });
  }

  const newKey = `${roomId}|${checkin}|${checkout}`;
  if (checkinTime || checkoutTime || state.cleanerSelectedId) {
    state.notes[newKey] = {
      ...(state.notes[newKey] || {}),
      checkinTime, checkoutTime,
      cleanerId: state.cleanerSelectedId,
      memo: memo || (state.notes[newKey] || {}).memo || '',
    };
  }

  saveLocal();
  cloudSaveDebounced();
  closeManualModal();
  render();
};
$('manual-modal').onclick = (e) => {
  if (e.target.id === 'manual-modal') closeManualModal();
};

// ════════════════════════════════════════════════════════════
// 공용공간 청소 모달
// ════════════════════════════════════════════════════════════
function openCommonModal(existingId) {
  state.commonEditingId = existingId || null;
  $('cm-title').textContent = existingId ? t('commonModalEditTitle') : t('commonModalTitle');

  const sel = $('cm-branch');
  sel.innerHTML = state.branches.map(b => 
    `<option value="${b.id}">${escapeHtml(b.name)}</option>`
  ).join('');

  if (existingId) {
    const c = (state.commonAreaCleanings || []).find(x => x.id === existingId);
    if (c) {
      sel.value = c.branchId;
      $('cm-date').value = c.date;
      $('cm-label').value = c.label || '';
      $('cm-memo').value = c.memo || '';
      state.cleanerSelectedId = c.cleanerId || null;
    }
    $('cm-delete').style.display = '';
  } else {
    const today = new Date();
    $('cm-date').value = fmtDate(today);
    $('cm-label').value = '';
    $('cm-memo').value = '';
    state.cleanerSelectedId = null;
    $('cm-delete').style.display = 'none';
  }

  renderCleanerChips('cm-cleaners', state.cleanerSelectedId, (sid) => {
    state.cleanerSelectedId = sid;
  });
  $('common-modal').classList.add('open');
}

function closeCommonModal() {
  $('common-modal').classList.remove('open');
  state.commonEditingId = null;
}

$('cm-cancel').onclick = closeCommonModal;
$('cm-save').onclick = () => {
  const branchId = $('cm-branch').value;
  const date = $('cm-date').value;
  const label = $('cm-label').value.trim();
  const memo = $('cm-memo').value.trim();
  const cleanerId = state.cleanerSelectedId;

  if (!branchId || !date) { alert(t('invalidCommonInputs')); return; }

  if (!state.commonAreaCleanings) state.commonAreaCleanings = [];

  if (state.commonEditingId) {
    const idx = state.commonAreaCleanings.findIndex(c => c.id === state.commonEditingId);
    if (idx >= 0) {
      state.commonAreaCleanings[idx] = {
        ...state.commonAreaCleanings[idx],
        branchId, date, label, memo, cleanerId,
      };
    }
  } else {
    state.commonAreaCleanings.push({
      id: 'cc_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7),
      branchId, date, label, memo, cleanerId,
    });
  }

  saveLocal();
  cloudSaveDebounced();
  closeCommonModal();
  render();
};
$('cm-delete').onclick = () => {
  if (!state.commonEditingId) return;
  if (!confirm(t('commonDeleteConfirm'))) return;
  state.commonAreaCleanings = (state.commonAreaCleanings || []).filter(c => c.id !== state.commonEditingId);
  saveLocal();
  cloudSaveDebounced();
  closeCommonModal();
  render();
};
$('common-modal').onclick = (e) => {
  if (e.target.id === 'common-modal') closeCommonModal();
};

document.addEventListener('click', (e) => {
  // 공용공간 청소 클릭 (data-common-id 속성으로 식별)
  const commonEv = e.target.closest('.event[data-common-id]');
  if (commonEv) {
    openCommonModal(commonEv.dataset.commonId);
    return;
  }
  // 기존 예약 클릭 (data-key 속성)
  const ev = e.target.closest('.event[data-key]');
  if (ev) {
    const key = ev.dataset.key;
    const all = getAllBookings();
    const b = all.find(x => noteKey(x) === key);
    if (b && b.isManual) {
      openManualModal(b.manualId);
    } else {
      openBookingModal(key);
    }
    return;
  }
  // 직원별 화면의 날짜 셀 클릭 (빈 셀이 아니고 task가 아닌 경우에만)
  // 위 두 분기에서 task 클릭은 이미 return 됐으므로 여기서는 셀 빈 영역 클릭만 도달
  if (state.view === 'bystaff') {
    const cell = e.target.closest('.bs-cell[data-date]');
    if (cell && !cell.classList.contains('empty')) {
      state.dayDetailDate = cell.dataset.date;
      state.dayDetailFromView = 'bystaff';
      state.view = 'dayDetail';
      render();
      return;
    }
  }
});

$('btn-refresh').onclick = async () => {
  // 1. 클라우드에서 다른 기기 변경사항 즉시 가져옴
  setStatus(t('statusCloudCheck'), 'syncing');
  const cloud = await cloudLoad();
  if (cloud && cloud.savedAt && cloud.savedAt !== lastCloudSavedAt) {
    if (applyCloudData(cloud)) {
      lastCloudSavedAt = cloud.savedAt;
      saveLocal();
    }
  }
  // 2. iCal 재동기화 (force - 캐시 무시하고 강제로 다시 받음)
  await syncICal(true);
};
$('btn-settings').onclick = () => { state.view = 'setup'; render(); };
$('btn-add-booking').onclick = () => {
  if (state.rooms.length === 0) { alert(t('needRoomFirst')); return; }
  openManualModal(null);
};
$('btn-add-common').onclick = () => {
  if (state.branches.length === 0) { alert(t('needBranchFirst')); return; }
  openCommonModal(null);
};

document.querySelectorAll('.tab').forEach(t => {
  t.onclick = () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    state.view = t.dataset.view;
    state.dayDetailDate = null;
    state.dayDetailFromView = null;
    render();
  };
});

// 언어 토글 핸들러
document.querySelectorAll('.lang-btn').forEach(b => {
  b.onclick = () => setLang(b.dataset.lang);
});

// jsonbin → Firebase 마이그레이션 (한 번만 실행)
const MIGRATION_KEY = 'schedule_v2_migrated';
async function migrateFromJsonbin() {
  // 이미 마이그레이션 완료했으면 스킵
  if (localStorage.getItem(MIGRATION_KEY)) return false;

  try {
    // Firebase에 이미 데이터가 있는지 확인
    const fbData = await cloudLoad();
    if (fbData && fbData.savedAt) {
      // Firebase에 데이터가 이미 있음 → 마이그레이션 불필요
      localStorage.setItem(MIGRATION_KEY, 'done');
      console.log('Firebase already has data, skipping migration');
      return false;
    }

    // jsonbin에서 데이터 가져오기 시도
    console.log('Attempting migration from jsonbin to Firebase...');
    const jsonbinData = await jsonbinLoadForMigration();
    if (!jsonbinData) {
      // jsonbin도 데이터 없음 → 새 사용자거나 한도 초과
      localStorage.setItem(MIGRATION_KEY, 'no-data');
      return false;
    }

    // jsonbin 데이터를 Firebase에 저장 (undefined 제거)
    const cleanData = JSON.parse(JSON.stringify(jsonbinData));
    await cloudPutOnce(cleanData, CONFIG.cloudSaveTimeoutMs);
    localStorage.setItem(MIGRATION_KEY, 'done');
    console.log('Migration successful');
    return true;
  } catch (e) {
    console.warn('Migration failed:', e);
    // 실패해도 다음에 다시 시도하지 않음 (jsonbin 한도 초과 등)
    // 사용자가 수동으로 재시도하려면 localStorage에서 MIGRATION_KEY 삭제
    localStorage.setItem(MIGRATION_KEY, 'failed');
    return false;
  }
}

// Firebase 실시간 리스너 설정 (다른 사람 변경을 즉시 감지)
let realtimeUnsubscribe = null;
function setupRealtimeListener() {
  if (!window.fb || !window.fb.ready) return;
  // 기존 리스너가 있으면 정리
  if (realtimeUnsubscribe) {
    realtimeUnsubscribe();
    realtimeUnsubscribe = null;
  }

  const dataRef = window.fb.ref(window.fb.db, CONFIG.fbDataPath);
  const callback = (snapshot) => {
    const cloud = snapshot.val();
    if (!cloud || !cloud.savedAt) return;

    // 우리가 방금 저장한 데이터의 echo면 무시
    if (cloud.savedAt === lastCloudSavedAt) return;
    if (cloudSaveInFlight) return;
    if (cloudSaveTimer) return;
    if (Date.now() - lastLocalSaveAt < CONFIG.echoIgnoreMs) return;

    // 모달 열려있거나 입력 중이면 적용 보류 (다음 변경 때 적용됨)
    if (state.bookingModalKey) return;
    if ($('manual-modal') && $('manual-modal').classList.contains('open')) return;
    if ($('common-modal') && $('common-modal').classList.contains('open')) return;
    const focused = document.activeElement;
    if (focused && (focused.tagName === 'INPUT' || focused.tagName === 'TEXTAREA')) return;

    // 다른 사람의 변경사항 → 적용
    if (applyCloudData(cloud)) {
      lastCloudSavedAt = cloud.savedAt;
      saveLocal();
      render();
      console.log('Realtime update applied');
    }
  };

  window.fb.onValue(dataRef, callback);
  realtimeUnsubscribe = () => window.fb.off(dataRef, 'value', callback);
}

async function init() {
  loadLang();
  loadLocal();
  applyStaticUI();
  render();

  setStatus(t('statusCloudCheck'), 'syncing');

  // Firebase가 로드될 때까지 잠깐 대기 (보통 1초 미만)
  try {
    await waitForFirebase(8000);
  } catch (e) {
    console.warn('Firebase load failed, working in offline mode:', e);
    setStatus('오프라인 모드', 'err');
    // Firebase 없이도 로컬 데이터로 작동
    if (state.rooms.length > 0) {
      await syncICal();
    } else {
      setStatus(t('statusNeedSetup'), 'err');
    }
    return;
  }

  // 마이그레이션 시도 (jsonbin → Firebase, 한 번만)
  await migrateFromJsonbin();

  // Firebase에서 최신 데이터 로드
  const cloud = await cloudLoad();
  if (cloud && applyCloudData(cloud)) {
    saveLocal();
    lastCloudSavedAt = cloud.savedAt;
  }
  render();

  // 이전 세션에서 저장 실패한 데이터가 있으면 재전송 시도
  flushPendingQueue().catch(e => console.warn('Queue flush error:', e));

  // 실시간 리스너 설정 (다른 사람 변경을 즉시 감지)
  setupRealtimeListener();

  if (state.rooms.length > 0) {
    await syncICal();
  } else {
    setStatus(t('statusNeedSetup'), 'err');
  }
}

let lastUserActivity = Date.now();
['click','keydown','touchstart'].forEach(ev => {
  document.addEventListener(ev, () => { lastUserActivity = Date.now(); }, { passive: true });
});

// 10분마다 백그라운드 iCal 자동 동기화 (캐시 활용해서 빠름)
setInterval(async () => {
  if (cloudSyncPaused) return;
  if (state.view === 'setup') return;
  if (state.bookingModalKey) return;
  if ($('manual-modal').classList.contains('open')) return;
  if ($('common-modal').classList.contains('open')) return;
  if (state.rooms.length === 0) return;
  // 페이지 숨김(다른 탭/앱) 상태면 스킵 - 어차피 visibility 이벤트로 처리됨
  if (document.visibilityState !== 'visible') return;
  // 사용자 입력 중엔 스킵
  const focused = document.activeElement;
  if (focused && (focused.tagName === 'INPUT' || focused.tagName === 'TEXTAREA')) return;
  if (Date.now() - lastUserActivity < 10000) return;

  // 백그라운드 동기화 (force=true로 캐시 갱신)
  try {
    await syncICal(true);
  } catch(e) { console.warn('Background iCal sync failed:', e); }
}, 10 * 60 * 1000); // 10분

// 앱이 백그라운드에서 다시 활성화되면 즉시 동기화 (예: 다른 앱 갔다 옴)
document.addEventListener('visibilitychange', async () => {
  // 화면이 사라질 때 (다른 앱으로 전환, 화면 끄기 등) - 즉시 저장
  if (document.visibilityState === 'hidden') {
    // 셋업 화면이거나 데이터 없으면 저장할 것 없음
    if (state.view === 'setup') return;
    if (state.rooms.length === 0) return;
    // 대기 중인 저장이 있으면 즉시 실행
    if (cloudSaveTimer) {
      cloudSaveBeacon();  // keepalive로 백그라운드에서도 전송 보장
    }
    return;
  }
  if (document.visibilityState !== 'visible') return;
  if (state.rooms.length === 0) return;
  if (state.view === 'setup') return;
  if (state.bookingModalKey) return;
  if ($('manual-modal').classList.contains('open')) return;
  if ($('common-modal').classList.contains('open')) return;
  // 클라우드 빠르게 확인
  try {
    const cloud = await cloudLoad();
    // echo 가드: 저장 진행 중이거나 최근 저장 직후면 적용 보류
    if (cloudSaveTimer) return;
    if (Date.now() - lastLocalSaveAt < CONFIG.echoIgnoreMs) return;
    if (cloud && cloud.savedAt && cloud.savedAt !== lastCloudSavedAt) {
      if (applyCloudData(cloud)) {
        lastCloudSavedAt = cloud.savedAt;
        saveLocal();
        render();
      }
    }
    // iCal은 캐시 있으면 즉시, 3분 지났으면 새로 받음
    await syncICal(false);
  } catch(e) { console.warn('Visibility sync failed:', e); }
});

// 페이지 닫힐 때 (탭 닫기, 브라우저 종료, 새로고침 등) - 즉시 저장
// beaconFired 락이 중복 실행을 막아줌
window.addEventListener('pagehide', () => {
  if (cloudSaveTimer || cloudSaveInFlight) {
    cloudSaveBeacon();
  }
});

window.addEventListener('beforeunload', () => {
  if (cloudSaveTimer || cloudSaveInFlight) {
    cloudSaveBeacon();
  }
});

// jsonbin 폴링 제거됨 - Firebase 실시간 리스너가 변경을 즉시 감지함

init();

</script>
